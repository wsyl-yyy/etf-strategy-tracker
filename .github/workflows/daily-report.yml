name: Daily encrypted ETF report

on:
  workflow_dispatch:
  schedule:
    - cron: "10 8 * * 1-5"

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m pytest

      - name: Prepare config
        env:
          CONFIG_JSON: ${{ secrets.CONFIG_JSON }}
        run: |
          if [ -n "$CONFIG_JSON" ]; then
            printf '%s' "$CONFIG_JSON" > config.json
          elif [ ! -f config.json ]; then
            cp config.example.json config.json
          fi

      - name: Generate encrypted report
        env:
          PYTHONPATH: src
          REPORT_PASSWORD: ${{ secrets.REPORT_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_RANGE: ${{ secrets.GOOGLE_SHEET_RANGE }}
        run: python -m etf_tracker.cli --config config.json --trades data/sample_trades.csv --out docs/report.json

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
