<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ETF量化策略日报</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #65717f;
        --line: #dde3ea;
        --accent: #0f766e;
        --accent-dark: #115e59;
        --danger: #b91c1c;
        --ok: #047857;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.55;
      }
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }
      header {
        margin-bottom: 18px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: 0;
      }
      h2 {
        margin: 0 0 12px;
        font-size: 20px;
      }
      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 14px;
      }
      input,
      select,
      textarea {
        width: 100%;
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--text);
        font: inherit;
        font-size: 16px;
        padding: 10px 11px;
      }
      textarea {
        min-height: 78px;
        resize: vertical;
      }
      button {
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #fff;
        font-size: 16px;
        padding: 11px 16px;
      }
      button:disabled {
        background: #9aa6b2;
      }
      button:active:not(:disabled) {
        background: var(--accent-dark);
      }
      .muted {
        color: var(--muted);
        font-size: 14px;
      }
      .panel,
      article {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }
      .panel + .panel,
      .panel + article,
      article + .panel {
        margin-top: 16px;
      }
      .row {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      .trade-list {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }
      .trade-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
      }
      .trade-card-title {
        margin-bottom: 10px;
        color: var(--muted);
        font-size: 14px;
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }
      button.secondary {
        background: #334155;
      }
      button.danger-btn {
        background: var(--danger);
      }
      .full {
        grid-column: 1 / -1;
      }
      .message {
        margin-top: 10px;
        min-height: 22px;
      }
      .error {
        color: var(--danger);
      }
      .success {
        color: var(--ok);
      }
      article {
        display: none;
        overflow-wrap: anywhere;
      }
      article h1 {
        font-size: 24px;
      }
      article h2 {
        margin-top: 24px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 6px;
        font-size: 19px;
      }
      article li {
        margin: 7px 0;
      }
      strong {
        color: var(--accent);
      }
      @media (max-width: 560px) {
        .row,
        .grid,
        .actions {
          grid-template-columns: 1fr;
          flex-direction: column;
        }
        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>ETF量化策略日报</h1>
        <div class="muted" id="meta">加载加密报告中...</div>
      </header>

      <section class="panel" id="unlock">
        <h2>查看日报</h2>
        <div class="muted">输入日报密码后在本机浏览器解密，密码不会发送到服务器。</div>
        <div class="row">
          <input id="password" type="password" autocomplete="current-password" placeholder="日报密码" />
          <button id="decrypt">解密查看</button>
        </div>
        <div class="message error" id="error"></div>
      </section>

      <article id="report"></article>

      <section class="panel" id="trade-panel">
        <h2>成交回填</h2>
        <form id="trade-form">
          <div class="grid">
            <label>
              日期
              <input id="trade-date" name="date" type="date" required />
            </label>
            <label>
              标的
              <input id="trade-symbol" name="symbol" list="symbol-list" inputmode="numeric" placeholder="563360" required />
            </label>
            <label>
              方向
              <select id="trade-side" name="side" required>
                <option value="买入">买入</option>
                <option value="卖出">卖出</option>
              </select>
            </label>
            <label>
              策略模块
              <input id="trade-module" name="module" list="module-list" placeholder="A500网格" />
            </label>
            <label>
              成交价
              <input id="trade-price" name="price" type="number" min="0" step="0.0001" inputmode="decimal" required />
            </label>
            <label>
              成交金额
              <input id="trade-amount" name="amount" type="number" min="0" step="0.01" inputmode="decimal" required />
            </label>
            <label>
              成交份额
              <input id="trade-shares" name="shares" type="number" min="0" step="0.01" inputmode="decimal" required />
            </label>
            <label>
              交易费用
              <input id="trade-fee" name="fee" type="number" min="0" step="0.01" inputmode="decimal" value="0" />
            </label>
            <label class="full">
              提交密码
              <input id="submit-password" name="submitPassword" type="password" autocomplete="current-password" required />
            </label>
            <label class="full">
              备注
              <textarea id="trade-note" name="note" placeholder="可选"></textarea>
            </label>
          </div>
          <div class="row">
            <button id="submit-trade" type="submit">提交成交</button>
          </div>
          <div class="message" id="trade-message"></div>
        </form>
        <datalist id="symbol-list">
          <option value="563360"></option>
          <option value="588000"></option>
        </datalist>
        <datalist id="module-list">
          <option value="A500网格"></option>
          <option value="A500底仓"></option>
          <option value="科创50分批"></option>
          <option value="风控"></option>
        </datalist>
      </section>

      <section class="panel" id="manage-panel">
        <h2>成交管理</h2>
        <form id="manage-form">
          <div class="row">
            <input id="manage-password" type="password" autocomplete="current-password" placeholder="提交密码" required />
            <button id="load-trades" type="submit">加载记录</button>
          </div>
        </form>
        <div class="message" id="manage-message"></div>
        <div class="trade-list" id="trade-list"></div>
      </section>
    </main>

    <script id="embedded-report" type="application/json">__ENCRYPTED_REPORT_JSON__</script>
    <script id="worker-config" type="application/json">__WORKER_CONFIG_JSON__</script>
    <script>
      const meta = document.getElementById("meta");
      const errorBox = document.getElementById("error");
      const reportNode = document.getElementById("report");
      const unlockNode = document.getElementById("unlock");
      const tradeForm = document.getElementById("trade-form");
      const tradeMessage = document.getElementById("trade-message");
      const submitTradeButton = document.getElementById("submit-trade");
      const manageForm = document.getElementById("manage-form");
      const manageMessage = document.getElementById("manage-message");
      const loadTradesButton = document.getElementById("load-trades");
      const tradeList = document.getElementById("trade-list");
      let encryptedReport = null;
      let currentManagePassword = "";

      async function loadReport() {
        try {
          const embedded = document.getElementById("embedded-report")?.textContent?.trim();
          if (embedded && embedded !== "__ENCRYPTED_REPORT_JSON__") {
            encryptedReport = JSON.parse(embedded);
            meta.textContent = `报告更新时间：${encryptedReport.updated_at || "未知"}`;
            return;
          }
          const response = await fetch("report.json", { cache: "no-store" });
          if (!response.ok) throw new Error("日报尚未生成。");
          encryptedReport = await response.json();
          meta.textContent = `报告更新时间：${encryptedReport.updated_at || "未知"}`;
        } catch (error) {
          meta.textContent = "无法加载报告";
          errorBox.textContent = error.message;
        }
      }

      async function decryptReport() {
        errorBox.textContent = "";
        if (!encryptedReport) {
          errorBox.textContent = "报告还没有加载完成。";
          return;
        }
        const password = document.getElementById("password").value;
        if (!password) {
          errorBox.textContent = "请输入密码。";
          return;
        }
        try {
          const markdown = await decryptPayload(encryptedReport, password);
          reportNode.innerHTML = renderMarkdown(markdown);
          reportNode.style.display = "block";
          unlockNode.style.display = "none";
        } catch (error) {
          errorBox.textContent = "密码错误或报告已损坏，无法解密。";
        }
      }

      async function decryptPayload(payload, password) {
        const salt = fromBase64(payload.salt);
        const iv = fromBase64(payload.iv);
        const ciphertext = fromBase64(payload.ciphertext);
        const baseKey = await crypto.subtle.importKey(
          "raw",
          new TextEncoder().encode(password),
          "PBKDF2",
          false,
          ["deriveKey"]
        );
        const key = await crypto.subtle.deriveKey(
          {
            name: "PBKDF2",
            salt,
            iterations: payload.iterations,
            hash: "SHA-256",
          },
          baseKey,
          { name: "AES-GCM", length: 256 },
          false,
          ["decrypt"]
        );
        const plaintext = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ciphertext);
        return new TextDecoder().decode(plaintext);
      }

      function fromBase64(value) {
        const binary = atob(value);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
        return bytes;
      }

      function renderMarkdown(markdown) {
        const lines = markdown.split(/\r?\n/);
        let html = "";
        let inList = false;
        for (const line of lines) {
          if (line.startsWith("# ")) {
            if (inList) {
              html += "</ul>";
              inList = false;
            }
            html += `<h1>${inline(line.slice(2))}</h1>`;
          } else if (line.startsWith("## ")) {
            if (inList) {
              html += "</ul>";
              inList = false;
            }
            html += `<h2>${inline(line.slice(3))}</h2>`;
          } else if (line.startsWith("- ")) {
            if (!inList) {
              html += "<ul>";
              inList = true;
            }
            html += `<li>${inline(line.slice(2))}</li>`;
          } else if (line.trim()) {
            if (inList) {
              html += "</ul>";
              inList = false;
            }
            html += `<p>${inline(line)}</p>`;
          }
        }
        if (inList) html += "</ul>";
        return html;
      }

      function inline(text) {
        return escapeHtml(text).replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
      }

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function readWorkerConfig() {
        const raw = document.getElementById("worker-config")?.textContent?.trim();
        if (!raw || raw === "__WORKER_CONFIG_JSON__") return { tradeSubmitUrl: "" };
        try {
          return JSON.parse(raw);
        } catch (error) {
          return { tradeSubmitUrl: "" };
        }
      }

      function initTradeForm() {
        const today = new Date(Date.now() - new Date().getTimezoneOffset() * 60000)
          .toISOString()
          .slice(0, 10);
        document.getElementById("trade-date").value = today;

        const urls = workerUrls();
        if (!urls.tradeSubmitUrl) {
          submitTradeButton.disabled = true;
          tradeMessage.className = "message error";
          tradeMessage.textContent = "成交回填尚未配置 Worker 地址。";
          return;
        }

        tradeForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          tradeMessage.className = "message";
          tradeMessage.textContent = "正在提交...";
          submitTradeButton.disabled = true;

          try {
            const payload = collectTradePayload();
            const response = await fetch(urls.tradeSubmitUrl, {
              method: "POST",
              mode: "cors",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            const result = await response.json().catch(() => ({}));
            if (!response.ok || result.ok === false) {
              throw new Error(result.error || "提交失败。");
            }
            tradeMessage.className = "message success";
            tradeMessage.textContent = "提交成功，日报会自动刷新。";
            tradeForm.reset();
            document.getElementById("trade-date").value = today;
            document.getElementById("trade-fee").value = "0";
          } catch (error) {
            tradeMessage.className = "message error";
            tradeMessage.textContent = error.message;
          } finally {
            submitTradeButton.disabled = false;
          }
        });
      }

      function initTradeManagement() {
        const urls = workerUrls();
        if (!urls.manageUrl) {
          loadTradesButton.disabled = true;
          manageMessage.className = "message error";
          manageMessage.textContent = "成交管理尚未配置 Worker 地址。";
          return;
        }

        manageForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          currentManagePassword = document.getElementById("manage-password").value;
          await loadManagedTrades();
        });
      }

      async function loadManagedTrades() {
        const urls = workerUrls();
        manageMessage.className = "message";
        manageMessage.textContent = "正在加载...";
        tradeList.innerHTML = "";
        loadTradesButton.disabled = true;

        try {
          const result = await requestJson(urls.manageUrl, {
            method: "POST",
            body: { submitPassword: currentManagePassword },
          });
          renderTradeList(result.trades || []);
          manageMessage.className = "message success";
          manageMessage.textContent = "成交记录已加载。";
        } catch (error) {
          manageMessage.className = "message error";
          manageMessage.textContent = error.message;
        } finally {
          loadTradesButton.disabled = false;
        }
      }

      function renderTradeList(trades) {
        tradeList.innerHTML = "";
        if (!trades.length) {
          tradeList.innerHTML = '<div class="muted">暂无成交记录。</div>';
          return;
        }

        for (const trade of trades) {
          const card = document.createElement("div");
          card.className = "trade-card";
          card.dataset.id = trade.id;
          card.innerHTML = `
            <div class="trade-card-title">${escapeHtml(trade.date || "")} · ${escapeHtml(trade.symbol || "")} · ${escapeHtml(trade.side || "")}</div>
            <div class="grid">
              <label>日期<input data-field="date" type="date" value="${attr(trade.date)}" required /></label>
              <label>标的<input data-field="symbol" inputmode="numeric" value="${attr(trade.symbol)}" required /></label>
              <label>方向<select data-field="side"><option value="买入">买入</option><option value="卖出">卖出</option></select></label>
              <label>策略模块<input data-field="module" value="${attr(trade.module)}" /></label>
              <label>成交价<input data-field="price" type="number" min="0" step="0.0001" inputmode="decimal" value="${attr(trade.price)}" required /></label>
              <label>成交金额<input data-field="amount" type="number" min="0" step="0.01" inputmode="decimal" value="${attr(trade.amount)}" required /></label>
              <label>成交份额<input data-field="shares" type="number" min="0" step="0.01" inputmode="decimal" value="${attr(trade.shares)}" required /></label>
              <label>交易费用<input data-field="fee" type="number" min="0" step="0.01" inputmode="decimal" value="${attr(trade.fee || 0)}" /></label>
              <label class="full">备注<textarea data-field="note">${escapeHtml(trade.note || "")}</textarea></label>
            </div>
            <div class="actions">
              <button class="secondary save-trade" type="button">保存修改</button>
              <button class="danger-btn delete-trade" type="button">删除</button>
            </div>
          `;
          card.querySelector('[data-field="side"]').value = trade.side || "买入";
          card.querySelector(".save-trade").addEventListener("click", () => saveManagedTrade(card));
          card.querySelector(".delete-trade").addEventListener("click", () => deleteManagedTrade(card));
          tradeList.appendChild(card);
        }
      }

      async function saveManagedTrade(card) {
        const urls = workerUrls();
        const id = card.dataset.id;
        manageMessage.className = "message";
        manageMessage.textContent = "正在保存...";
        try {
          await requestJson(urls.tradeUrl(id), {
            method: "PUT",
            body: { ...collectCardTrade(card), submitPassword: currentManagePassword },
          });
          manageMessage.className = "message success";
          manageMessage.textContent = "修改已保存，日报会自动刷新。";
          await loadManagedTrades();
        } catch (error) {
          manageMessage.className = "message error";
          manageMessage.textContent = error.message;
        }
      }

      async function deleteManagedTrade(card) {
        const urls = workerUrls();
        const id = card.dataset.id;
        manageMessage.className = "message";
        manageMessage.textContent = "正在删除...";
        try {
          await requestJson(urls.tradeUrl(id), {
            method: "DELETE",
            body: { submitPassword: currentManagePassword },
          });
          manageMessage.className = "message success";
          manageMessage.textContent = "成交已删除，日报会自动刷新。";
          await loadManagedTrades();
        } catch (error) {
          manageMessage.className = "message error";
          manageMessage.textContent = error.message;
        }
      }

      async function requestJson(url, options) {
        const response = await fetch(url, {
          method: options.method,
          mode: "cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(options.body),
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok || result.ok === false) {
          throw new Error(result.error || "请求失败。");
        }
        return result;
      }

      function workerUrls() {
        const { tradeSubmitUrl } = readWorkerConfig();
        if (!tradeSubmitUrl) return { tradeSubmitUrl: "", manageUrl: "", tradeUrl: () => "" };
        const baseUrl = tradeSubmitUrl.endsWith("/trade") ? tradeSubmitUrl.slice(0, -"/trade".length) : tradeSubmitUrl.replace(/\/$/, "");
        return {
          tradeSubmitUrl,
          manageUrl: `${baseUrl}/trades/manage`,
          tradeUrl: (id) => `${baseUrl}/trade/${encodeURIComponent(id)}`,
        };
      }

      function collectTradePayload() {
        return {
          submitPassword: document.getElementById("submit-password").value,
          date: document.getElementById("trade-date").value,
          symbol: document.getElementById("trade-symbol").value.trim(),
          side: document.getElementById("trade-side").value,
          module: document.getElementById("trade-module").value.trim(),
          price: numberValue("trade-price"),
          amount: numberValue("trade-amount"),
          shares: numberValue("trade-shares"),
          fee: numberValue("trade-fee"),
          note: document.getElementById("trade-note").value.trim(),
        };
      }

      function collectCardTrade(card) {
        return {
          date: card.querySelector('[data-field="date"]').value,
          symbol: card.querySelector('[data-field="symbol"]').value.trim(),
          side: card.querySelector('[data-field="side"]').value,
          module: card.querySelector('[data-field="module"]').value.trim(),
          price: Number(card.querySelector('[data-field="price"]').value),
          amount: Number(card.querySelector('[data-field="amount"]').value),
          shares: Number(card.querySelector('[data-field="shares"]').value),
          fee: Number(card.querySelector('[data-field="fee"]').value || 0),
          note: card.querySelector('[data-field="note"]').value.trim(),
        };
      }

      function numberValue(id) {
        const value = document.getElementById(id).value;
        return value === "" ? 0 : Number(value);
      }

      function attr(value) {
        return escapeHtml(String(value ?? ""));
      }

      document.getElementById("decrypt").addEventListener("click", decryptReport);
      document.getElementById("password").addEventListener("keydown", (event) => {
        if (event.key === "Enter") decryptReport();
      });
      loadReport();
      initTradeForm();
      initTradeManagement();
    </script>
  </body>
</html>
